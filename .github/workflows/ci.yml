name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # Xcode 15 이상 (Swift 6 지원)
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_15.3.app/Contents/Developer || \
          true
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build --configuration debug

      - name: Test
        run: swift test --parallel --enable-code-coverage

      - name: Collect coverage
        run: |
          xcrun llvm-cov export \
            .build/debug/MaestroPackageTests.xctest/Contents/MacOS/MaestroPackageTests \
            -instr-profile=.build/debug/codecov/default.profdata \
            -format=lcov \
            -ignore-filename-regex="Tests|.build" \
            > coverage.lcov || echo "coverage export failed (non-fatal for early phases)"

      - name: Upload coverage artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
          if-no-files-found: ignore
          retention-days: 14

  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict --reporter github-actions-logging
