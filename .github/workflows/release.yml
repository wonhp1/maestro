name: Release

# 태그 (`v*`) push 시 트리거. 인증서 secret 이 설정되어 있으면 codesign + notarize +
# stapled DMG 산출. 미설정이면 unsigned bundle + DMG 까지만 (PR 검토용).
#
# 필요한 GitHub Actions secrets (Settings → Secrets):
#   MAESTRO_SIGN_IDENTITY        codesign 인증서 이름 ("Developer ID Application: NAME (TEAM)")
#   MAESTRO_SIGN_P12_BASE64      .p12 파일 base64
#   MAESTRO_SIGN_P12_PASSWORD    .p12 password
#   MAESTRO_NOTARY_APPLE_ID      Apple ID
#   MAESTRO_NOTARY_TEAM_ID       Team ID
#   MAESTRO_NOTARY_APP_PASSWORD  app-specific password
#
# secrets 없으면 sign-notarize.sh 가 자동 dry-run.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run mode (skip signing/notarization)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 30
    # Job-level env — secrets 를 boolean 으로 한 번만 평가해 step `if:` 에서 사용.
    # step-level `if: secrets.X != ''` 직접 평가는 GitHub schema 가 거부 (run #8 fail).
    env:
      HAS_SIGNING: ${{ secrets.MAESTRO_SIGN_P12_BASE64 != '' }}
      HAS_NOTARY: ${{ secrets.MAESTRO_NOTARY_APP_PASSWORD != '' }}
      HAS_SPARKLE: ${{ secrets.MAESTRO_SPARKLE_PRIVATE_KEY != '' }}
      MAESTRO_SPARKLE_PUBLIC_KEY: ${{ secrets.MAESTRO_SPARKLE_PUBLIC_KEY }}
      MAESTRO_APPCAST_URL: https://wonhp1.github.io/maestro/appcast.xml
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build app bundle
        run: scripts/build-app.sh

      - name: Import codesign cert
        if: env.HAS_SIGNING == 'true'
        env:
          P12: ${{ secrets.MAESTRO_SIGN_P12_BASE64 }}
          P12_PASS: ${{ secrets.MAESTRO_SIGN_P12_PASSWORD }}
        run: |
          # ephemeral runner — 그래도 keychain password 는 매 빌드마다 random.
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          echo "::add-mask::$KEYCHAIN_PASS"
          echo "MAESTRO_KEYCHAIN_PASS=$KEYCHAIN_PASS" >> "$GITHUB_ENV"

          KEYCHAIN=maestro-build.keychain
          security create-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN
          security set-keychain-settings $KEYCHAIN
          echo "$P12" | base64 --decode > cert.p12
          security import cert.p12 -k $KEYCHAIN -P "$P12_PASS" -A
          rm cert.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" $KEYCHAIN

      - name: Store notarytool credentials
        if: env.HAS_NOTARY == 'true'
        env:
          APPLE_ID: ${{ secrets.MAESTRO_NOTARY_APPLE_ID }}
          TEAM_ID: ${{ secrets.MAESTRO_NOTARY_TEAM_ID }}
          APP_PASS: ${{ secrets.MAESTRO_NOTARY_APP_PASSWORD }}
        # `|| true` 제거 — 등록 실패는 다음 sign step 의 silent failure 를 만듦.
        # 명시적 실패가 디버깅 빠름 (audit MEDIUM).
        run: |
          xcrun notarytool store-credentials maestro-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_PASS" \
            --keychain "$HOME/Library/Keychains/maestro-build.keychain-db"

      - name: Sign + notarize
        env:
          MAESTRO_SIGN_IDENTITY: ${{ secrets.MAESTRO_SIGN_IDENTITY }}
          MAESTRO_NOTARY_PROFILE: maestro-notary
        run: scripts/sign-notarize.sh

      - name: Build DMG
        run: |
          brew install create-dmg || true
          scripts/build-dmg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Maestro-DMG
          path: build/Maestro-*.dmg
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Maestro-*.dmg
          generate_release_notes: true

      # v0.11.1: Sparkle appcast 자동 갱신 + GitHub Pages 배포.
      - name: Update Sparkle appcast
        if: env.HAS_SPARKLE == 'true' && startsWith(github.ref, 'refs/tags/v')
        env:
          MAESTRO_SPARKLE_PRIVATE_KEY: ${{ secrets.MAESTRO_SPARKLE_PRIVATE_KEY }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # tag 에서 버전 추출 (e.g. "v0.11.1" → "0.11.1")
          VERSION="${GITHUB_REF##*/v}"
          DMG=$(ls build/Maestro-*.dmg | head -1)
          if [ -z "$DMG" ]; then
            echo "❌ DMG 미발견" >&2
            exit 1
          fi
          # Sparkle 도구 빌드 (sign_update 가 .build/artifacts 에 들어옴)
          swift build --target Sparkle 2>&1 | tail -3 || true
          ./scripts/update-appcast.sh "$VERSION" "$DMG"

      - name: Commit appcast.xml + push
        if: env.HAS_SPARKLE == 'true' && startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/appcast.xml; then
            echo "appcast.xml 변경 없음 — skip commit"
            exit 0
          fi
          git add docs/appcast.xml
          git commit -m "chore(release): appcast.xml v${GITHUB_REF##*/v}"
          # tag commit 이라 detached HEAD — main 으로 push 해야 GitHub Pages 가 재배포
          git push origin HEAD:main
