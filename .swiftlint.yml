# SwiftLint 설정 — Maestro
# 참조: https://github.com/realm/SwiftLint
# 로컬 실행: brew install swiftlint && swiftlint --strict

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData

# 유용한 opt-in 규칙들 (과한 스타일 규칙은 의도적으로 제외)
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - lower_acl_than_parent
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_zero_over_explicit_init
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - sorted_imports
  - static_operator
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - trailing_comma                    # SwiftUI 빌더와 충돌
  - todo                              # TODO 주석 프로젝트상 필요
  - line_length                       # 아래서 재설정
  # 테스트 코드에서 너무 빡빡:
  - force_unwrapping                  # 테스트 AAA 패턴에 자연스러움
  - non_optional_string_data_conversion   # Swift 6 스타일 조언, 테스트엔 과함
  - optional_data_string_conversion       # 동일
  # 의견 차 심한 포맷 규칙:
  - multiline_arguments                # 호출 스타일 강제
  - prefer_self_in_static_references   # 오탐 많음
  - strict_fileprivate                 # private/fileprivate 구분 유효

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 1    # 단일 문자 변수는 테스트/수학적 맥락에서 일반적
  excluded:
    - id
    - to
    - of
    - ok
    - a
    - b
    - c
    - d
    - e
    - p
    - q
    - s
    - t
    - x
    - y
    - z
    - fn

function_body_length:
  warning: 60
  error: 120

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 3

reporter: "xcode"
